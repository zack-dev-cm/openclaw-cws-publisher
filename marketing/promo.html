<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=440,height=280,initial-scale=1" />
    <link rel="stylesheet" href="marketing.css" />
    <style>
      body {
        width: 440px;
        height: 280px;
        overflow: hidden;
      }

      .frame {
        padding: 20px;
      }

      .card {
        padding: 24px;
        display: grid;
        gap: 20px;
      }

      .headline {
        font-size: 26px;
      }

      .subline {
        font-size: 15px;
        margin-top: 8px;
      }

      .pill {
        font-size: 12px;
        padding: 8px 12px;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="card">
        <div class="brand">
          <div class="brand-mark"></div>
          <div>
            <p class="eyebrow">LocalLens</p>
            <h1 class="headline">Private AI summaries for any page</h1>
            <p class="subline">No account. No server. Active tab only.</p>
          </div>
        </div>
        <div class="pill-row">
          <span class="pill">Summarize</span>
          <span class="pill">Simplify</span>
          <span class="pill">Translate</span>
          <span class="pill">Safe-share</span>
        </div>
      </div>
    </div>
  </body>
  </html>
