<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=128,height=128,initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        width: 128px;
        height: 128px;
        overflow: hidden;
        background: #f3ecdd;
      }

      .frame {
        width: 128px;
        height: 128px;
        display: grid;
        place-items: center;
      }

      .icon {
        position: relative;
        width: 112px;
        height: 112px;
        border-radius: 28px;
        background:
          radial-gradient(circle at 24% 24%, rgba(255, 255, 255, 0.82), transparent 18%),
          linear-gradient(145deg, #0f8f6f, #f5bf6f);
        box-shadow: inset 0 0 0 10px rgba(255, 255, 255, 0.18);
      }

      .icon::before {
        content: "";
        position: absolute;
        inset: 28px;
        border-radius: 50%;
        border: 12px solid rgba(255, 255, 255, 0.92);
      }

      .icon::after {
        content: "";
        position: absolute;
        right: 22px;
        top: 18px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.96);
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="icon"></div>
    </div>
  </body>
  </html>
